<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SummarAI</title>
  <meta name="description" content="AI-powered text summarizer powered by T5." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d0d0f;
      --surface:     #161618;
      --surface-2:   #1f1f22;
      --border:      rgba(255,255,255,.07);
      --text-1:      #eeedf5;
      --text-2:      #8b8898;
      --text-3:      #454353;
      --purple:      #8b5cf6;
      --purple-dim:  rgba(139,92,246,.15);
      --purple-glow: rgba(139,92,246,.35);
      --blue:        #3b82f6;
      --pink:        #ec4899;
      --sb-w:        240px;
      --hdr:         56px;
    }

    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-1);
      display: flex;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface-2); border-radius: 99px; }

    /* ══════════════════════════════════════
       AURORA BACKGROUND ANIMATION
    ══════════════════════════════════════ */
    #aurora {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .aurora-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0;
      animation: aurora-fade 1.2s ease forwards;
    }
    .aurora-blob:nth-child(1) {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(139,92,246,.22) 0%, transparent 70%);
      top: -15%; left: -10%;
      animation-name: aurora-fade, aurora-drift-1;
      animation-duration: 1.2s, 18s;
      animation-delay: 0s, 1.2s;
      animation-timing-function: ease, ease-in-out;
      animation-fill-mode: forwards, none;
      animation-iteration-count: 1, infinite;
      animation-direction: normal, alternate;
    }
    .aurora-blob:nth-child(2) {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(59,130,246,.18) 0%, transparent 70%);
      bottom: -10%; right: -5%;
      animation-name: aurora-fade, aurora-drift-2;
      animation-duration: 1.2s, 22s;
      animation-delay: 0.3s, 1.2s;
      animation-timing-function: ease, ease-in-out;
      animation-fill-mode: forwards, none;
      animation-iteration-count: 1, infinite;
      animation-direction: normal, alternate;
    }
    .aurora-blob:nth-child(3) {
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(236,72,153,.12) 0%, transparent 70%);
      top: 40%; left: 45%;
      animation-name: aurora-fade, aurora-drift-3;
      animation-duration: 1.2s, 26s;
      animation-delay: 0.6s, 1.2s;
      animation-timing-function: ease, ease-in-out;
      animation-fill-mode: forwards, none;
      animation-iteration-count: 1, infinite;
      animation-direction: normal, alternate;
    }

    @keyframes aurora-fade {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes aurora-drift-1 {
      0%   { transform: translate(0, 0)    scale(1); }
      33%  { transform: translate(60px, 40px) scale(1.08); }
      66%  { transform: translate(-30px, 70px) scale(.95); }
      100% { transform: translate(40px, -30px) scale(1.05); }
    }
    @keyframes aurora-drift-2 {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(-50px, -60px) scale(1.1); }
      66%  { transform: translate(40px, -30px) scale(.92); }
      100% { transform: translate(-20px, 50px) scale(1.06); }
    }
    @keyframes aurora-drift-3 {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(40px, -50px) scale(1.12); }
      66%  { transform: translate(-60px, 30px) scale(.9); }
      100% { transform: translate(30px, 60px) scale(1.04); }
    }

    /* ══════════════════════════════════════
       SIDEBAR
    ══════════════════════════════════════ */
    #sidebar {
      position: relative;
      z-index: 10;
      width: var(--sb-w);
      height: 100vh;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: rgba(16,16,18,.85);
      backdrop-filter: blur(20px);
      border-right: 1px solid var(--border);
      transition: width .25s cubic-bezier(.4,0,.2,1);
      overflow: hidden;
    }
    #sidebar.collapsed { width: 0; border-right: none; }

    .sb-top {
      padding: 16px 14px 12px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; white-space: nowrap;
    }
    .logo-mark {
      width: 30px; height: 30px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--purple), #6d28d9);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-mark svg { width: 16px; height: 16px; color: #fff; }
    .logo-name {
      font-size: 14px; font-weight: 600;
      color: var(--text-1); letter-spacing: -.2px;
    }
    .logo-name span { color: var(--purple); }

    .sb-new-btn {
      margin: 12px 10px 8px;
      width: calc(100% - 20px);
      display: flex; align-items: center; gap: 8px;
      padding: 9px 12px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-2); font-size: 13px; font-weight: 500;
      cursor: pointer; font-family: inherit;
      transition: background .15s, border-color .15s, color .15s;
      white-space: nowrap;
    }
    .sb-new-btn:hover { background: var(--surface-2); border-color: rgba(255,255,255,.12); color: var(--text-1); }
    .sb-new-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

    .sb-section {
      padding: 8px 14px 4px;
      font-size: 10px; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text-3);
      white-space: nowrap;
    }

    .sb-list {
      flex: 1; overflow-y: auto;
      padding: 2px 6px 16px;
    }
    .sb-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 8px; border-radius: 7px;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }
    .sb-item:hover { background: var(--surface-2); }
    .sb-item.active { background: var(--purple-dim); }

    .sb-ic {
      width: 24px; height: 24px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-3);
    }
    .sb-item.active .sb-ic { color: var(--purple); }
    .sb-ic svg { width: 14px; height: 14px; }

    .sb-meta { flex: 1; min-width: 0; }
    .sb-title {
      font-size: 12.5px; font-weight: 400; color: var(--text-2);
      overflow: hidden; text-overflow: ellipsis;
    }
    .sb-item.active .sb-title { color: var(--text-1); }
    .sb-date { font-size: 10.5px; color: var(--text-3); margin-top: 1px; }

    .sb-del {
      opacity: 0; flex-shrink: 0;
      background: none; border: none; cursor: pointer;
      color: var(--text-3); padding: 3px; border-radius: 4px;
      transition: opacity .15s, color .15s, background .15s;
    }
    .sb-item:hover .sb-del { opacity: 1; }
    .sb-del:hover { color: #f87171; background: rgba(248,113,113,.1); }
    .sb-del svg { width: 12px; height: 12px; display: block; }

    .sb-empty {
      padding: 24px 12px; text-align: center;
      font-size: 12px; color: var(--text-3); line-height: 1.7;
    }

    /* ══════════════════════════════════════
       MAIN
    ══════════════════════════════════════ */
    #main {
      position: relative; z-index: 5;
      flex: 1; min-width: 0;
      display: flex; flex-direction: column;
      height: 100vh; overflow: hidden;
    }

    /* Header */
    #hdr {
      height: var(--hdr);
      display: flex; align-items: center;
      padding: 0 20px 0 14px; gap: 10px;
      background: rgba(13,13,15,.6);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #hdr-menu {
      background: none; border: none; cursor: pointer;
      padding: 6px; border-radius: 7px; color: var(--text-2);
      display: flex; align-items: center;
      transition: background .15s, color .15s;
    }
    #hdr-menu:hover { background: var(--surface-2); color: var(--text-1); }
    #hdr-menu svg { width: 18px; height: 18px; }

    .hdr-title {
      font-size: 14px; font-weight: 500; color: var(--text-2);
    }
    .hdr-title b { color: var(--text-1); font-weight: 600; }
    .hdr-gap { flex: 1; }
    .hdr-status {
      display: flex; align-items: center; gap: 6px;
      font-size: 11.5px; color: var(--text-3);
    }
    .hdr-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #34d399;
      box-shadow: 0 0 8px #34d399;
      animation: blink 2.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* Scrollable content */
    #content {
      flex: 1; overflow-y: auto;
      display: flex; flex-direction: column;
    }

    /* ── WELCOME ── */
    #welcome {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 0 24px 20px;
      text-align: center;
    }

    .w-heading {
      font-size: clamp(28px, 3.5vw, 42px);
      font-weight: 300;
      color: var(--text-1);
      letter-spacing: -1px;
      line-height: 1.25;
      margin-bottom: 14px;
    }
    .w-heading strong {
      font-weight: 600;
      background: linear-gradient(120deg, #a78bfa 0%, #818cf8 50%, #67e8f9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .w-sub {
      font-size: 14.5px; font-weight: 400;
      color: var(--text-2); line-height: 1.65;
      max-width: 420px;
    }

    /* ── RESULT VIEW ── */
    #result-view {
      display: none;
      padding: 28px 24px 0;
      max-width: 760px; width: 100%;
      margin: 0 auto;
    }

    .rv-back {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12.5px; color: var(--text-3);
      background: none; border: none; cursor: pointer; font-family: inherit;
      padding: 0; margin-bottom: 22px;
      transition: color .15s;
    }
    .rv-back:hover { color: var(--text-1); }
    .rv-back svg { width: 14px; height: 14px; }

    /* Stats */
    .rv-stats {
      display: flex; gap: 10px; margin-bottom: 18px;
    }
    .rv-stat {
      flex: 1;
      padding: 14px 16px;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .rv-stat-val {
      font-size: 20px; font-weight: 600;
      color: var(--text-1); letter-spacing: -.4px;
    }
    .rv-stat-lbl { font-size: 11px; color: var(--text-3); margin-top: 3px; }

    /* Summary block */
    .rv-summary {
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .rv-sum-head {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
    }
    .rv-sum-label {
      font-size: 12px; font-weight: 500; color: var(--text-2);
    }
    .rv-copy {
      margin-left: auto;
      background: none; border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 11px;
      font-size: 11.5px; font-weight: 500; color: var(--text-2);
      cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 5px;
      transition: background .15s, color .15s, border-color .15s;
    }
    .rv-copy:hover { background: var(--surface-2); color: var(--text-1); border-color: rgba(255,255,255,.12); }
    .rv-copy svg { width: 12px; height: 12px; }

    .rv-sum-body { padding: 18px 16px; }
    #summary-text {
      font-size: 14.5px; line-height: 1.85; color: var(--text-1); font-weight: 300;
    }

    /* Original text */
    .rv-orig {
      background: rgba(255,255,255,.02);
      border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      margin-bottom: 14px;
    }
    .rv-orig-toggle {
      width: 100%; display: flex; align-items: center; gap: 8px;
      padding: 12px 16px; background: none; border: none;
      cursor: pointer; font-family: inherit;
      font-size: 12px; font-weight: 500; color: var(--text-3);
      text-align: left; transition: color .15s;
    }
    .rv-orig-toggle:hover { color: var(--text-2); }
    .rv-orig-toggle svg { width: 13px; height: 13px; }
    .chev { margin-left: auto; transition: transform .2s; }
    .rv-orig.open .chev { transform: rotate(180deg); }
    .rv-orig-body {
      display: none; padding: 0 16px 16px;
      border-top: 1px solid var(--border);
    }
    .rv-orig.open .rv-orig-body { display: block; }
    #original-text {
      font-size: 13px; line-height: 1.75; color: var(--text-2);
      padding-top: 14px; max-height: 240px; overflow-y: auto; font-weight: 300;
    }

    .rv-new {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 14px; margin-bottom: 24px;
      background: none; border: 1px dashed var(--border);
      border-radius: 10px; cursor: pointer; font-family: inherit;
      font-size: 13px; color: var(--text-3);
      transition: border-color .15s, color .15s, background .15s;
    }
    .rv-new:hover { border-color: rgba(255,255,255,.15); color: var(--text-2); background: rgba(255,255,255,.02); }
    .rv-new svg { width: 14px; height: 14px; }

    /* ══════════════════════════════════════
       FIXED INPUT BAR
    ══════════════════════════════════════ */
    #input-bar {
      flex-shrink: 0;
      padding: 8px 20px 22px;
    }

    #err-wrap { max-width: 680px; margin: 0 auto 8px; }
    .err-msg {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px;
      background: rgba(248,113,113,.07);
      border: 1px solid rgba(248,113,113,.2);
      border-radius: 8px;
      font-size: 12.5px; color: #fca5a5; line-height: 1.5;
    }
    .err-msg svg { width: 14px; height: 14px; color: #f87171; flex-shrink: 0; }

    .input-box {
      max-width: 680px; margin: 0 auto;
      background: rgba(255,255,255,.05);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 16px;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-box:focus-within {
      border-color: rgba(139,92,246,.4);
      box-shadow: 0 0 0 3px rgba(139,92,246,.07);
    }

    #dialogue-input {
      display: block; width: 100%;
      background: transparent; border: none; outline: none; resize: none;
      padding: 16px 18px 10px;
      font-family: inherit; font-size: 14px;
      color: var(--text-1); line-height: 1.7;
      min-height: 58px; max-height: 200px;
      overflow-y: auto;
    }
    #dialogue-input::placeholder { color: var(--text-3); }

    .input-footer {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px 12px;
    }
    #char-count {
      font-size: 11px; color: var(--text-3);
      font-variant-numeric: tabular-nums;
    }
    #char-count.warn { color: #fbbf24; }
    .input-gap { flex: 1; }
    #btn-clear {
      background: none; border: none; cursor: pointer;
      font-size: 12px; color: var(--text-3); font-family: inherit;
      padding: 5px 10px; border-radius: 6px;
      transition: color .15s, background .15s;
    }
    #btn-clear:hover { color: var(--text-2); background: var(--surface-2); }
    #btn-send {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 18px;
      background: var(--purple);
      color: #fff; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit;
      transition: opacity .2s, transform .2s, box-shadow .2s;
      box-shadow: 0 2px 12px var(--purple-glow);
    }
    #btn-send:hover:not(:disabled) {
      opacity: .9; transform: translateY(-1px);
      box-shadow: 0 4px 20px var(--purple-glow);
    }
    #btn-send:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    #btn-send svg { width: 15px; height: 15px; }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.25);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 22px; right: 22px; z-index: 999;
      display: flex; align-items: center; gap: 7px;
      padding: 10px 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 12.5px; color: var(--text-1);
      box-shadow: 0 8px 30px rgba(0,0,0,.5);
      transform: translateY(60px); opacity: 0;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s ease;
      pointer-events: none;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast-ico { width: 14px; height: 14px; flex-shrink: 0; }

    /* ── MOBILE ── */
    #mob-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.6); z-index: 9;
    }
    #mob-overlay.on { display: block; }

    @media (max-width: 640px) {
      #sidebar {
        position: fixed; top: 0; left: 0; height: 100vh;
        z-index: 20;
        transform: translateX(-100%);
        transition: transform .25s cubic-bezier(.4,0,.2,1);
      }
      #sidebar.open { transform: translateX(0); }
      #sidebar.collapsed { transform: translateX(-100%); }
      .rv-stats { flex-wrap: wrap; }
      .rv-stat { min-width: calc(50% - 5px); }
    }
  </style>
</head>
<body>

<!-- Aurora background -->
<div id="aurora" aria-hidden="true">
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
</div>

<!-- ── SIDEBAR ── -->
<aside id="sidebar">
  <div class="sb-top">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
    </div>
    <span class="logo-name">Summar<span>AI</span></span>
  </div>

  <button class="sb-new-btn" id="btn-new">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    New summary
  </button>

  <div class="sb-section">Recent</div>

  <div class="sb-list" id="sb-list">
    <div class="sb-empty" id="sb-empty">No summaries yet</div>
  </div>
</aside>

<div id="mob-overlay"></div>

<!-- ── MAIN ── -->
<div id="main">
  <header id="hdr">
    <button id="hdr-menu" aria-label="Toggle sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <span class="hdr-title"><b>SummarAI</b></span>
    <div class="hdr-gap"></div>
    <div class="hdr-status">
      <div class="hdr-dot"></div>
      Ai Model ready
    </div>
  </header>

  <div id="content">

    <!-- WELCOME -->
    <div id="welcome">
      <h1 class="w-heading">
        What should we<br/><strong>summarize?</strong>
      </h1>
      <p class="w-sub">Paste any text below and get a clean, concise AI summary.</p>
    </div>

    <!-- RESULT -->
    <div id="result-view">
      <button class="rv-back" id="btn-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Back
      </button>

      <div class="rv-stats">
        <div class="rv-stat"><div class="rv-stat-val" id="st-orig">—</div><div class="rv-stat-lbl">Original words</div></div>
        <div class="rv-stat"><div class="rv-stat-val" id="st-sum">—</div><div class="rv-stat-lbl">Summary words</div></div>
        <div class="rv-stat"><div class="rv-stat-val" id="st-pct">—</div><div class="rv-stat-lbl">Reduction</div></div>
      </div>

      <div class="rv-summary">
        <div class="rv-sum-head">
          <span class="rv-sum-label">Summary</span>
          <span id="rv-ts" style="font-size:11px;color:var(--text-3);margin-left:8px;"></span>
          <button class="rv-copy" id="btn-copy">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            Copy
          </button>
        </div>
        <div class="rv-sum-body"><p id="summary-text"></p></div>
      </div>

      <div class="rv-orig" id="orig-card">
        <button class="rv-orig-toggle" id="orig-toggle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          Original text
          <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        <div class="rv-orig-body"><p id="original-text"></p></div>
      </div>

      <button class="rv-new" id="btn-another">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Summarize another text
      </button>
    </div>

  </div><!-- /content -->

  <!-- FIXED INPUT BAR -->
  <div id="input-bar">
    <div id="err-wrap"></div>
    <div class="input-box">
      <textarea
        id="dialogue-input"
        placeholder="Paste your text here… (Ctrl + Enter to summarize)"
        rows="3"
        aria-label="Text to summarize"
      ></textarea>
      <div class="input-footer">
        <span id="char-count">0 /150 words</span>
        <div class="input-gap"></div>
        <button id="btn-clear">Clear</button>
        <button id="btn-send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
          Summarize
        </button>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast">
  <svg id="toast-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="20 6 9 17 4 12"/>
  </svg>
  <span id="toast-msg"></span>
</div>

<script>
/* ══════════════════════════════════════════
   SummarAI — Logic
══════════════════════════════════════════ */
const STORE = 'summarai_hist';
const MAX   = 40;

const sidebar     = document.getElementById('sidebar');
const mobOverlay  = document.getElementById('mob-overlay');
const hdrMenu     = document.getElementById('hdr-menu');
const sbList      = document.getElementById('sb-list');
const sbEmpty     = document.getElementById('sb-empty');
const welcome     = document.getElementById('welcome');
const resultView  = document.getElementById('result-view');
const input       = document.getElementById('dialogue-input');
const charCount   = document.getElementById('char-count');
const btnClear    = document.getElementById('btn-clear');
const btnSend     = document.getElementById('btn-send');
const btnBack     = document.getElementById('btn-back');
const btnAnother  = document.getElementById('btn-another');
const btnNew      = document.getElementById('btn-new');
const btnCopy     = document.getElementById('btn-copy');
const summaryText = document.getElementById('summary-text');
const origText    = document.getElementById('original-text');
const rvTs        = document.getElementById('rv-ts');
const origCard    = document.getElementById('orig-card');
const origToggle  = document.getElementById('orig-toggle');
const stOrig      = document.getElementById('st-orig');
const stSum       = document.getElementById('st-sum');
const stPct       = document.getElementById('st-pct');
const errWrap     = document.getElementById('err-wrap');
const toast       = document.getElementById('toast');
const toastMsg    = document.getElementById('toast-msg');
const toastIco    = document.getElementById('toast-ico');
const content     = document.getElementById('content');

let history   = load();
let activeId  = null;
let sbVisible = window.innerWidth > 640;

// Init
renderSB();
showWelcome();

/* ── Sidebar ── */
hdrMenu.addEventListener('click', () => {
  sbVisible = !sbVisible;
  applySB();
});
mobOverlay.addEventListener('click', () => {
  sbVisible = false;
  applySB();
});
function applySB() {
  if (window.innerWidth <= 640) {
    sidebar.classList.toggle('open', sbVisible);
    sidebar.classList.remove('collapsed');
    mobOverlay.classList.toggle('on', sbVisible);
  } else {
    sidebar.classList.toggle('collapsed', !sbVisible);
    mobOverlay.classList.remove('on');
  }
}

/* ── Input auto-grow ── */
input.addEventListener('input', () => {
  const n = input.value.length;
  charCount.textContent = n.toLocaleString() + ' chars';
  charCount.classList.toggle('warn', n > 4500);
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 200) + 'px';
});

/* ── Clear ── */
btnClear.addEventListener('click', () => {
  input.value = '';
  input.style.height = 'auto';
  charCount.textContent = '0 chars';
  charCount.classList.remove('warn');
  clearErr();
  input.focus();
});

/* ── Submit ── */
btnSend.addEventListener('click', submit);
input.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') submit();
});

async function submit() {
  const text = input.value.trim();
  if (!text) { toast_show('Please enter some text.', 'err'); input.focus(); return; }
  clearErr();
  setLoading(true);
  try {
    const res = await fetch('/summarize/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ dialogue: text }),
    });
    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      throw new Error(d.detail || `Server error ${res.status}`);
    }
    const data = await res.json();
    const entry = addHistory(text, data.summary || '');
    activeId = entry.id;
    renderSB();
    showResult(entry);
    toast_show('Done!', 'ok');
    // Clear the input textarea after successful summarization
    input.value = '';
    input.style.height = 'auto';
    charCount.textContent = '0 chars';
    charCount.classList.remove('warn');
  } catch(e) {
    showErr(e.message);
  } finally {
    setLoading(false);
  }
}

function setLoading(on) {
  btnSend.disabled = on;
  btnSend.innerHTML = on
    ? `<div class="spinner"></div> Working…`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Summarize`;
}

/* ── Show result ── */
function showResult(entry) {
  const ow = wc(entry.original);
  const sw = wc(entry.summary);
  const pct = ow > 0 ? Math.round((1 - sw / ow) * 100) : 0;
  stOrig.textContent = ow.toLocaleString();
  stSum.textContent  = sw.toLocaleString();
  stPct.textContent  = pct + '%';
  summaryText.textContent = entry.summary;
  origText.textContent    = entry.original;
  rvTs.textContent        = relTime(entry.ts);
  origCard.classList.remove('open');
  welcome.style.display     = 'none';
  resultView.style.display  = 'block';
  content.scrollTop = 0;
}

function showWelcome() {
  welcome.style.display    = 'flex';
  resultView.style.display = 'none';
  activeId = null;
  renderSB();
}

/* ── Collapse original ── */
origToggle.addEventListener('click', () => origCard.classList.toggle('open'));

/* ── Nav ── */
btnBack.addEventListener('click', showWelcome);
btnAnother.addEventListener('click', showWelcome);
btnNew.addEventListener('click', () => {
  showWelcome();
  if (window.innerWidth <= 640) { sbVisible = false; applySB(); }
});

/* ── Copy ── */
btnCopy.addEventListener('click', () => {
  navigator.clipboard.writeText(summaryText.textContent || '').then(() => {
    toast_show('Copied!', 'ok');
    const orig = btnCopy.innerHTML;
    btnCopy.textContent = 'Copied';
    setTimeout(() => { btnCopy.innerHTML = orig; }, 2000);
  });
});

/* ── History ── */
function load() {
  try { return JSON.parse(localStorage.getItem(STORE)) || []; } catch { return []; }
}
function save() { localStorage.setItem(STORE, JSON.stringify(history)); }
function addHistory(original, summary) {
  const e = { id: Date.now().toString(), title: makeTitle(original), original, summary, ts: new Date().toISOString() };
  history.unshift(e);
  if (history.length > MAX) history = history.slice(0, MAX);
  save();
  return e;
}
function delHistory(id) {
  history = history.filter(e => e.id !== id);
  save();
  if (activeId === id) showWelcome();
  renderSB();
}
function renderSB() {
  sbList.querySelectorAll('.sb-item').forEach(el => el.remove());
  sbEmpty.style.display = history.length ? 'none' : 'block';
  history.forEach(e => {
    const el = document.createElement('div');
    el.className = 'sb-item' + (e.id === activeId ? ' active' : '');
    el.innerHTML = `
      <div class="sb-ic">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
      </div>
      <div class="sb-meta">
        <div class="sb-title">${esc(e.title)}</div>
        <div class="sb-date">${relTime(e.ts)}</div>
      </div>
      <button class="sb-del" data-id="${e.id}" title="Delete">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        </svg>
      </button>`;
    el.addEventListener('click', ev => {
      if (ev.target.closest('.sb-del')) return;
      activeId = e.id; showResult(e); renderSB();
      if (window.innerWidth <= 640) { sbVisible = false; applySB(); }
    });
    el.querySelector('.sb-del').addEventListener('click', ev => {
      ev.stopPropagation(); delHistory(e.id);
    });
    sbList.insertBefore(el, sbEmpty);
  });
}

/* ── Error ── */
function showErr(msg) {
  errWrap.innerHTML = `<div class="err-msg">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span>${esc(msg)}</span></div>`;
}
function clearErr() { errWrap.innerHTML = ''; }

/* ── Toast ── */
let _tt;
function toast_show(msg, type) {
  clearTimeout(_tt);
  toastMsg.textContent = msg;
  if (type === 'ok') { toastIco.style.color = '#34d399'; toastIco.innerHTML = '<polyline points="20 6 9 17 4 12"/>'; }
  else { toastIco.style.color = '#f87171'; toastIco.innerHTML = '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>'; }
  toast.classList.add('show');
  _tt = setTimeout(() => toast.classList.remove('show'), 2800);
}

/* ── Helpers ── */
function wc(t) { return t.trim().split(/\s+/).filter(Boolean).length; }
function makeTitle(t) { return t.trim().replace(/\s+/g,' ').split(' ').slice(0,6).join(' ') + '…'; }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function relTime(iso) {
  const s = (Date.now() - new Date(iso)) / 1000;
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return new Date(iso).toLocaleDateString(undefined, { month:'short', day:'numeric' });
}
</script>
</body>
</html>
